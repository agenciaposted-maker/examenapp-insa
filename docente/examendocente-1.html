<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ExamenDoc — Panel Docente v2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#e2e5ea;
  --text:#1a1d23;--text2:#6b7280;--accent:#2563eb;--accent-light:#eff6ff;
  --accent-dark:#1d4ed8;--success:#16a34a;--danger:#dc2626;--warn:#d97706;
  --slate:#1e293b;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1419;--surface:#1a1f26;--surface2:#252d38;--border:#3d4654;
    --text:#e7e9ea;--text2:#8b98a5;--accent:#3b82f6;--accent-light:#1e3a5f;
    --accent-dark:#60a5fa;--success:#22c55e;--danger:#ef4444;--warn:#f59e0b;
    --slate:#0f172a;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--slate);color:#fff;padding:.85rem 1.4rem;display:flex;align-items:center;gap:.9rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-logo{font-family:'Lora',serif;font-size:1.25rem;font-weight:500}
.hdr-sub{font-size:.72rem;opacity:.5;font-weight:300}
.hdr-badge{margin-left:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:.25rem .8rem;border-radius:20px;font-size:.75rem}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:1.5rem 1.2rem}

/* STEPS */
.steps{display:flex;gap:0;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.step{flex:1;padding:.7rem .5rem;text-align:center;font-size:.78rem;font-weight:500;color:var(--text2);border-right:1px solid var(--border);cursor:default;transition:all .2s;position:relative}
.step:last-child{border-right:none}
.step.active{background:var(--accent);color:#fff}
.step.done{background:#f0fdf4;color:var(--success)}
.step-num{display:block;font-size:1rem;font-weight:700;margin-bottom:.1rem}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:1rem}
.card-title{font-size:.9rem;font-weight:600;color:var(--slate);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:8px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.87rem;font-weight:500;transition:all .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--accent-dark)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover:not(:disabled){background:#15803d}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.btn-sm{padding:.28rem .65rem;font-size:.78rem}
.btn-icon{padding:.4rem .6rem;font-size:.95rem}
.w-full{width:100%}

/* INPUTS */
.input{width:100%;padding:.52rem .75rem;border:1px solid var(--border);border-radius:8px;font-family:'Outfit',sans-serif;font-size:.87rem;color:var(--text);background:var(--surface);transition:border-color .15s,box-shadow .15s}
.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.input{resize:vertical;min-height:75px;line-height:1.55}
select.input{cursor:pointer}
label{display:block;font-size:.76rem;font-weight:600;color:var(--text2);margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.04em}
.form-group{margin-bottom:.85rem}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:2.2rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-light)}
.upload-zone input[type=file]{display:none}
.upload-icon{font-size:2.4rem;margin-bottom:.5rem;display:block}

/* QUESTION CARDS */
.q-card{border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.7rem;background:var(--surface);position:relative}
.q-card:hover{border-color:#c0c8d8}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--accent);color:#fff;border-radius:50%;font-size:.74rem;font-weight:700;flex-shrink:0}
.q-header{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.75rem}
.q-actions{position:absolute;top:.6rem;right:.6rem;display:flex;gap:.25rem}
.q-type-badge{display:inline-block;padding:.12rem .55rem;border-radius:20px;font-size:.7rem;font-weight:600;background:var(--accent-light);color:var(--accent);margin-left:.4rem}

/* PROGRESS */
.progress-bar{height:4px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:.3rem 0}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}

/* BADGE / TAG */
.badge{display:inline-block;padding:.15rem .55rem;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-blue{background:var(--accent-light);color:var(--accent)}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fef2f2;color:var(--danger)}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.75rem 1.2rem;border-radius:10px;font-size:.83rem;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:1000;animation:toastIn .3s ease;max-width:300px}
@keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* PARSED PREVIEW */
.parsed-item{display:flex;align-items:flex-start;gap:.6rem;padding:.65rem .8rem;border-radius:8px;background:var(--surface2);margin-bottom:.4rem;border:1px solid var(--border)}
.parsed-check{color:var(--success);font-size:1rem;margin-top:.1rem;flex-shrink:0}
.parsed-text{font-size:.84rem;line-height:1.5;flex:1}
.parsed-meta{font-size:.72rem;color:var(--text2);margin-top:.15rem}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1rem}
.summary-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.8rem;text-align:center}
.summary-val{font-size:1.5rem;font-weight:700;color:var(--accent)}
.summary-label{font-size:.74rem;color:var(--text2);margin-top:.1rem}

/* UTILS */
.flex{display:flex}.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-center{display:flex;justify-content:center;align-items:center}
.gap-sm{gap:.45rem}.gap-md{gap:.75rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem}
.mt-sm{margin-top:.45rem}.mt-md{margin-top:.9rem}
.text-sm{font-size:.81rem;color:var(--text2)}
.text-center{text-align:center}
.tip{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:.65rem .9rem;font-size:.81rem;margin-bottom:.85rem;line-height:1.5}
.tip-blue{background:var(--accent-light);border-color:#bfdbfe;color:#1e40af}
.empty{text-align:center;padding:2rem;color:var(--text2);border:1px dashed var(--border);border-radius:10px}
.empty .empty-icon{font-size:2rem;margin-bottom:.5rem}
.divider{border:none;border-top:1px solid var(--border);margin:.9rem 0}
.section-title{font-family:'Lora',serif;font-size:1.35rem;color:var(--slate);margin-bottom:.2rem}
.section-sub{font-size:.82rem;color:var(--text2);margin-bottom:1.1rem}

/* OPTIONS (multiple choice) */
.opt-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.4rem}
.opt-letter{width:24px;height:24px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;flex-shrink:0;color:var(--text2)}
.opt-correct{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-toggle-pw{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:.9rem;opacity:.6;padding:.2rem}
.btn-toggle-pw:hover{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">📝 ExamenDoc</div>
    <div class="hdr-sub">Panel Docente — Creador de Exámenes</div>
  </div>
  <span class="hdr-badge" id="hdrBadge">INSA Vespertino</span>
</div>

<div class="main" id="app"></div>
<div id="toasts"></div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<!-- Mammoth.js para Word -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

// ═══════════════════════════════════════
// STATE (con persistencia localStorage)
// ═══════════════════════════════════════
const STORAGE_KEY = 'examdoc_state';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) { console.warn('No se pudo cargar estado guardado:', e); }
  return null;
}

function saveState() {
  try {
    const toSave = { ...S, password: '', password2: '' }; // No guardar contraseñas
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch(e) { console.warn('No se pudo guardar estado:', e); }
}

function clearState() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

const defaultState = {
  step: 1,
  meta: { name:'', subject:'Lenguaje y Literatura', grade:'2° Bachillerato General', section:'N', teacher:'', date:'', instructions:'', duration:0 },
  rawText: '',
  fileName: '',
  questions: [],
  sections: [],
  password: '',
  password2: '',
};

const S = loadState() || { ...defaultState };

// ═══════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════
function render() {
  const screens = { 1: screenMeta, 2: screenUpload, 3: screenQuestions, 4: screenPassword };
  document.getElementById('app').innerHTML = `
    ${renderSteps()}
    ${screens[S.step]()}`;
  bindEvents();
  saveState(); // Autoguardar
}

function renderSteps() {
  const labels = ['Datos del examen','Cargar preguntas','Revisar y editar','Contraseña y exportar'];
  return `<div class="steps">${labels.map((l,i)=>`
    <div class="step ${S.step===i+1?'active':S.step>i+1?'done':''}">
      <span class="step-num">${S.step>i+1?'✓':i+1}</span>${l}
    </div>`).join('')}</div>`;
}

// ═══════════════════════════════════════
// STEP 1 — DATOS
// ═══════════════════════════════════════
function screenMeta() {
  return `
  <div class="section-title">Datos del examen</div>
  <div class="section-sub">Información general que aparecerá en el encabezado del examen</div>
  <div class="card">
    <div class="form-group">
      <label for="m_name">Nombre / Título del examen ★</label>
      <input class="input" id="m_name" placeholder="Ej: Primer Parcial — Literatura Medieval" value="${esc(S.meta.name)}" autocomplete="off">
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label for="m_subject">Materia ★</label>
        <input class="input" id="m_subject" value="${esc(S.meta.subject)}" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="m_grade">Grado</label>
        <input class="input" id="m_grade" value="${esc(S.meta.grade)}" autocomplete="off">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label for="m_section">Sección</label>
        <input class="input" id="m_section" value="${esc(S.meta.section)}" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="m_teacher">Docente</label>
        <input class="input" id="m_teacher" value="${esc(S.meta.teacher)}" autocomplete="off">
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label for="m_date">Fecha del examen</label>
        <input class="input" type="date" id="m_date" value="${S.meta.date}">
      </div>
      <div class="form-group">
        <label for="m_duration">Duración (minutos) — 0 = sin límite</label>
        <input class="input" type="number" id="m_duration" min="0" max="300" placeholder="Ej: 90" value="${S.meta.duration || ''}">
      </div>
    </div>
    <div class="form-group">
      <label for="m_instructions">Indicaciones generales</label>
      <textarea class="input" id="m_instructions" placeholder="Lea detenidamente cada pregunta antes de responder...">${esc(S.meta.instructions)}</textarea>
    </div>
  </div>
  <div class="flex-between">
    <span class="text-sm">★ Campos requeridos</span>
    <button class="btn btn-primary" onclick="saveMeta()">Continuar → Cargar preguntas</button>
  </div>`;
}

function saveMeta() {
  const name = document.getElementById('m_name').value.trim();
  if (!name) { toast('Ingresá el nombre del examen','error'); return; }
  S.meta.name = name;
  S.meta.subject = document.getElementById('m_subject').value.trim() || 'Lenguaje y Literatura';
  S.meta.grade = document.getElementById('m_grade').value.trim();
  S.meta.section = document.getElementById('m_section').value.trim();
  S.meta.teacher = document.getElementById('m_teacher').value.trim();
  S.meta.date = document.getElementById('m_date').value;
  S.meta.duration = parseInt(document.getElementById('m_duration').value) || 0;
  S.meta.instructions = document.getElementById('m_instructions').value.trim();
  S.step = 2; render();
}

// ═══════════════════════════════════════
// STEP 2 — CARGAR ARCHIVO
// ═══════════════════════════════════════
function screenUpload() {
  return `
  <div class="section-title">Cargar preguntas</div>
  <div class="section-sub">Subí el documento con las preguntas del examen</div>
  <div class="card">
    <div class="tip tip-blue">
      💡 <strong>Formatos aceptados:</strong> PDF digital (.pdf) y Word (.docx)<br>
      El sistema detecta automáticamente preguntas numeradas (1., 2., 1), 2), etc.) y secciones.<br>
      Después podrás revisar, corregir y agregar respuestas a cada pregunta.
    </div>
    <div class="upload-zone" id="dropZone"
      onclick="document.getElementById('fileIn').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <input type="file" id="fileIn" accept=".pdf,.docx,.doc" onchange="loadFile(this)">
      <span class="upload-icon">📂</span>
      <div style="font-weight:600;margin-bottom:.3rem">Subir PDF o Word</div>
      <div class="text-sm">Arrastrá el archivo o hacé click · .pdf · .docx</div>
    </div>
    ${S.fileName ? `
    <div style="margin-top:.9rem;padding:.6rem .9rem;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;display:flex;align-items:center;gap:.6rem">
      <span>✅</span>
      <div>
        <div style="font-size:.85rem;font-weight:600">${esc(S.fileName)}</div>
        <div class="text-sm">Archivo cargado — revisá el texto extraído abajo</div>
      </div>
    </div>` : ''}
  </div>

  ${S.rawText ? `
  <div class="card">
    <div class="flex-between" style="margin-bottom:.7rem">
      <div class="card-title" style="margin-bottom:0">📄 Texto extraído</div>
      <div class="flex gap-sm">
        <button class="btn btn-secondary btn-sm" onclick="parseQuestions()">🔍 Detectar preguntas</button>
      </div>
    </div>
    <div class="tip">✏️ Podés editar este texto antes de detectar preguntas. Asegurate de que las preguntas estén numeradas (1. o 1))</div>
    <textarea class="input" id="rawText" style="min-height:200px;font-size:.8rem;font-family:monospace;line-height:1.6">${esc(S.rawText)}</textarea>
  </div>
  <div class="flex-between">
    <button class="btn btn-secondary" onclick="S.step=1;render()">← Volver</button>
    <button class="btn btn-primary" onclick="parseAndNext()">Detectar preguntas y continuar →</button>
  </div>` : `
  <div class="flex-between">
    <button class="btn btn-secondary" onclick="S.step=1;render()">← Volver</button>
    <button class="btn btn-secondary" onclick="skipUpload()">Saltar — ingresar preguntas manualmente</button>
  </div>`}`;
}

function handleDrop(event) {
  event.preventDefault();
  event.currentTarget.classList.remove('drag');
  const file = event.dataTransfer.files[0];
  if (!file) return;
  const dt = new DataTransfer();
  dt.items.add(file);
  document.getElementById('fileIn').files = dt.files;
  loadFile(document.getElementById('fileIn'));
}

async function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  S.fileName = file.name;
  S.rawText = '';

  const ext = file.name.split('.').pop().toLowerCase();
  try {
    if (ext === 'pdf') {
      await loadPDF(file);
    } else if (ext === 'docx' || ext === 'doc') {
      await loadDocx(file);
    } else {
      toast('Formato no soportado. Usá PDF o DOCX','error');
      return;
    }
    render();
    toast('Archivo cargado ✓','ok');
  } catch(e) {
    toast('Error al leer el archivo: ' + e.message, 'error');
  }
}

async function loadPDF(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  let text = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    // Preserve line structure
    let lastY = null;
    let lineText = '';
    content.items.forEach(item => {
      if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) {
        text += lineText.trim() + '\n';
        lineText = '';
      }
      lineText += item.str;
      lastY = item.transform[5];
    });
    if (lineText.trim()) text += lineText.trim() + '\n';
    text += '\n';
  }
  S.rawText = text.trim();
}

async function loadDocx(file) {
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({arrayBuffer: buf});
  S.rawText = result.value.trim();
  if (result.messages.length > 0) {
    console.log('Mammoth messages:', result.messages);
  }
}

function skipUpload() {
  S.rawText = '';
  S.fileName = '';
  S.questions = [];
  S.step = 3;
  render();
}

// ═══════════════════════════════════════
// PARSER DE PREGUNTAS — MULTI-ESTRATEGIA
// ═══════════════════════════════════════
function parseAndNext() {
  const txt = document.getElementById('rawText') ? document.getElementById('rawText').value : S.rawText;
  S.rawText = txt;
  parseQuestions();
  if (S.questions.length === 0) {
    toast('No se detectaron preguntas. Revisá el formato o agregá manualmente.','error');
    return;
  }
  S.step = 3;
  render();
}

function parseQuestions() {
  const el = document.getElementById('rawText');
  const txt = el ? el.value : S.rawText;
  S.rawText = txt;

  // Normalizar texto
  const raw = txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rawLines = raw.split('\n').map(l => l.trim());

  // Preprocesar: unir líneas fragmentadas
  const lines = typeof preprocessLines === 'function' ? preprocessLines(rawLines) : rawLines;

  // Detectar secciones con pesos
  S.sections = detectSections(lines);

  // ── Ejecutar TODAS las estrategias en paralelo ──
  const strategyResults = [
    parseTableFormat(lines),         // E1: tabla estructurada
    parseEjercicioFormat(lines),     // E2: Consigna/Respuesta
    parseStandardNumbered(lines),    // E3: numerado estándar
    parsePreguntaLabel(lines),       // E4: "Pregunta N:"
    parseQuestionWithOptions(lines), // E5: verbos imperativos + opciones
    parseFallback(lines),            // E6: cualquier "?"
  ];

  // Estrategia que sola encontró más preguntas
  const bestSingle = strategyResults.reduce((best, r) => r.length > best.length ? r : best, []);

  // Normalizar texto para comparar duplicados entre estrategias
  const normKey = s => (s || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim().substring(0, 40);

  // Combinar todas las estrategias eliminando duplicados
  const seen = new Set();
  const merged = [];
  for (const results of strategyResults) {
    for (const q of results) {
      const key = normKey(q.text);
      if (key.length > 4 && !seen.has(key)) {
        seen.add(key);
        merged.push(q);
      }
    }
  }

  // Ordenar preguntas combinadas por su posición real en el documento
  const getDocPos = q => {
    const prefix = normKey(q.text).substring(0, 20);
    const idx = lines.findIndex(l => normKey(l).includes(prefix));
    return idx >= 0 ? idx : 9999;
  };
  merged.sort((a, b) => getDocPos(a) - getDocPos(b));

  // Usar la combinación solo si aporta más del 10% de preguntas adicionales
  // (evita ruido cuando todas las estrategias encuentran las mismas preguntas)
  let questions = merged.length > bestSingle.length * 1.1 ? merged : bestSingle;

  // Asignar sección a cada pregunta según su posición en el documento
  if (S.sections.length > 0) {
    questions = questions.map(q => {
      const qPos = getDocPos(q);
      let assigned = S.sections[0].id;
      for (const sec of S.sections) {
        if (sec.lineIdx <= qPos) assigned = sec.id;
      }
      return { ...q, section: assigned };
    });
  }

  // ── Post-procesamiento: detectar tipos de las que quedaron sin opciones
  questions = questions.map(q => {
    // Si ya tiene tipo asignado que no sea 'open', mantenerlo
    if (q.type && q.type !== 'open') return q;

    // Re-evaluar tipo basado en el texto
    const hasOpts = q.options && q.options.length >= 2;
    q.type = detectType(q.text, hasOpts);

    // Detectar espacios en blanco en el texto
    if (/_{2,}|\.{3,}|\[\s*\]/.test(q.text) && q.type === 'open') {
      q.type = 'fill';
    }

    return q;
  });

  // Normalizar letras de opciones: ordenar y re-asignar A, B, C, D en secuencia
  questions = questions.map(q => {
    if (q.type === 'multiple' && q.options && q.options.length >= 2) {
      q.options.sort((a, b) => a.letter.localeCompare(b.letter));
      const correctIdx = q.options.findIndex(o => o.correct);
      q.options = q.options.map((o, i) => ({ ...o, letter: String.fromCharCode(65 + i) }));
      if (correctIdx >= 0) {
        const newLetter = String.fromCharCode(65 + correctIdx);
        q.answer = newLetter;
        q.correct = newLetter;
      }
    }
    return q;
  });

  // Limpiar y asignar IDs
  S.questions = questions
    .map((q,i) => ({
      ...q,
      id: i,
      text: clean(q.text),
      answer: clean(q.answer || ''),
      keywords: q.keywords || autoKeywords(q.answer || ''),
      points: q.points || 1,
      type: q.type || detectType(q.text, q.options && q.options.length >= 2),
      options: q.options || [],
      correct: q.correct || '',
    }))
    .filter(q => q.text.length > 4);

  if (document.getElementById('rawText')) render();
  toast(`Detectadas ${S.questions.length} preguntas ✓`, S.questions.length > 0 ? 'ok' : 'error');
}

// ── ESTRATEGIA 1: Tabla con número | Pregunta: | R ──
function parseTableFormat(lines) {
  const questions = [];
  let i = 0;

  // Patterns de inicio de pregunta en tabla
  const isNum     = l => /^\d{1,3}$/.test(l);
  const isPregunta = l => /^pregunta\s*:/i.test(l);
  const isNumPregunta = l => /^\d{1,3}\s+pregunta\s*:/i.test(l); // "1 Pregunta:"
  const isAnswer  = l => /^r$/i.test(l) || /^r\s*[:\.\-]\s*/i.test(l) || /^respuesta\s*[\/:]?\s*(soluci[oó]n)?\s*:/i.test(l);
  const isAnswerInline = l => /^r\s+\w/i.test(l); // "R La figura..."
  const optPat = /^[\(\[]?([a-fA-F])[\)\.\-\]]\s*(.+)/;
  const correctMarker = /^\*|[\*✓✔]$|\(correcta?\)|\(correct\)/i;

  // Detectar si hay al menos un patrón de tabla en el documento
  const hasTablePattern = lines.some((l,idx) => {
    return (isNum(l) && lines.slice(idx+1, idx+4).some(ll => isPregunta(ll) || isNumPregunta(ll)))
      || isNumPregunta(l);
  });

  if (!hasTablePattern) return [];

  while (i < lines.length) {
    const line = lines[i];

    // Caso A: número solo en su línea
    if (isNum(line)) {
      let qText = '';
      let aText = '';
      let opts = [];
      i++;

      // Recoger texto de pregunta y opciones hasta que aparezca "R" o nuevo número
      while (i < lines.length && !isAnswer(lines[i]) && !isAnswerInline(lines[i]) && !isNum(lines[i]) && !isNumPregunta(lines[i])) {
        const l = lines[i];
        if (l && !isSkipLine(l)) {
          const om = l.match(optPat);
          if (om) {
            opts.push({ letter: om[1].toUpperCase(), text: om[2].trim(), correct: correctMarker.test(l) });
          } else {
            qText += ' ' + l.replace(/^pregunta\s*:\s*/i, '');
          }
        }
        i++;
      }

      // Si llegamos a una línea de respuesta
      if (i < lines.length && (isAnswer(lines[i]) || isAnswerInline(lines[i]))) {
        // Respuesta en la misma línea o siguiente
        if (isAnswerInline(lines[i])) {
          aText = lines[i].replace(/^r\s+/i,'');
          i++;
        } else {
          i++; // saltar "R"
        }
        // Continuar leyendo respuesta hasta siguiente número o Ejercicio
        while (i < lines.length && !isNum(lines[i]) && !isNumPregunta(lines[i]) && !isEjercicio(lines[i])) {
          const l = lines[i];
          if (l && !isSkipLine(l) && !isAnswer(l)) aText += ' ' + l;
          i++;
        }
      }

      if (qText.trim().length > 3) {
        const q = { text: qText.trim(), answer: aText.trim(), type: detectType(qText) };
        if (opts.length >= 2) {
          q.options = opts;
          q.type = 'multiple';
          const correct = opts.find(o => o.correct);
          if (correct) q.answer = correct.letter;
        }
        questions.push(q);
      }
      continue;
    }

    // Caso B: "1 Pregunta: texto..."
    if (isNumPregunta(line)) {
      let qText = line.replace(/^\d{1,3}\s+pregunta\s*:\s*/i,'');
      let aText = '';
      let opts = [];
      i++;

      while (i < lines.length && !isAnswer(lines[i]) && !isAnswerInline(lines[i]) && !isNum(lines[i]) && !isNumPregunta(lines[i])) {
        const l = lines[i];
        if (l && !isSkipLine(l)) {
          const om = l.match(optPat);
          if (om) {
            opts.push({ letter: om[1].toUpperCase(), text: om[2].trim(), correct: correctMarker.test(l) });
          } else {
            qText += ' ' + l;
          }
        }
        i++;
      }

      if (i < lines.length && (isAnswer(lines[i]) || isAnswerInline(lines[i]))) {
        if (isAnswerInline(lines[i])) { aText = lines[i].replace(/^r\s+/i,''); i++; }
        else i++;
        while (i < lines.length && !isNum(lines[i]) && !isNumPregunta(lines[i]) && !isEjercicio(lines[i])) {
          const l = lines[i];
          if (l && !isSkipLine(l) && !isAnswer(l)) aText += ' ' + l;
          i++;
        }
      }

      if (qText.trim().length > 3) {
        const q = { text: qText.trim(), answer: aText.trim(), type: detectType(qText) };
        if (opts.length >= 2) {
          q.options = opts;
          q.type = 'multiple';
          const correct = opts.find(o => o.correct);
          if (correct) q.answer = correct.letter;
        }
        questions.push(q);
      }
      continue;
    }

    i++;
  }

  return questions;
}

// ── ESTRATEGIA 2: Ejercicio N: | Consigna: | Respuesta/Solución: ──
function parseEjercicioFormat(lines) {
  const questions = [];
  let i = 0;

  const isConsigna  = l => /^consigna\s*:/i.test(l);
  const isRespuesta = l => /^respuesta\s*(\/\s*soluci[oó]n)?\s*:/i.test(l);

  // Verificar si hay este formato
  if (!lines.some(l => isConsigna(l) || isRespuesta(l))) return [];

  while (i < lines.length) {
    const line = lines[i];

    if (isConsigna(line)) {
      let qText = line.replace(/^consigna\s*:\s*/i,'');
      let aText = '';
      i++;

      // Más texto de pregunta
      while (i < lines.length && !isRespuesta(lines[i]) && !isConsigna(lines[i]) && !isEjercicio(lines[i])) {
        const l = lines[i];
        if (l && !isSkipLine(l)) qText += ' ' + l;
        i++;
      }

      // Respuesta
      if (i < lines.length && isRespuesta(lines[i])) {
        aText = lines[i].replace(/^respuesta\s*(\/\s*soluci[oó]n)?\s*:\s*/i,'');
        i++;
        while (i < lines.length && !isConsigna(lines[i]) && !isEjercicio(lines[i])) {
          const l = lines[i];
          if (l && !isSkipLine(l)) aText += ' ' + l;
          i++;
        }
      }

      if (qText.trim().length > 3) {
        questions.push({ text: qText.trim(), answer: aText.trim(), type: detectType(qText) });
      }
      continue;
    }
    i++;
  }
  return questions;
}

// ── ESTRATEGIA 3: Numerado estándar 1. / 1) / 1- ──
function parseStandardNumbered(lines) {
  const questions = [];
  // Pregunta: 1. / 1) / 1- / 1.- / 1:
  const qPat = /^(\d{1,3})[.\-\)\:]{1,2}\s*(.+)/;
  // Respuesta: "R:" / "Respuesta:" / "Resp:" / "Rta:" — requiere separador cuando es R sola
  // para no confundir con verbos como "Responde..." o texto que empiece con R
  const aPat = /^[Rr](?:espuesta|esp|ta)[:\.\-]?\s*(.+)|^[Rr][:\.\-]\s*(.+)|^[Aa]nswer[:\.\-]?\s*(.+)/i;
  // Opciones: a) / a. / A) / A. / (a) / [a] / a- / a: y también i) ii) iii) iv)
  const optPat = /^[\(\[]?([a-fA-F]|[ivxIVX]{1,4})[\)\.\-\:\]]\s*(.+)/;
  // Opciones en una sola línea: "a) texto  b) texto  c) texto"
  const multiOptPat = /([a-fA-F])\)\s*([^a-fA-F\)]+)/gi;
  // Detectar respuesta correcta marcada: *a) / a)* / (correcta) / ✓
  const correctMarker = /^\*|[\*✓✔]$|\(correcta?\)|\(correct\)|\(respuesta\)/i;

  let current = null;
  let mode = null; // 'q' | 'a'
  let opts = [];

  const save = () => {
    if (current) {
      if (opts.length >= 2) {
        current.options = opts;
        current.type = 'multiple';
        // Si hay una opción marcada como correcta, usarla como respuesta
        const correct = opts.find(o => o.correct);
        if (correct) current.answer = correct.letter;
      }
      questions.push(current);
    }
    current = null; mode = null; opts = [];
  };

  for (const line of lines) {
    if (!line || isSkipLine(line)) continue;

    const qm = line.match(qPat);
    const am = line.match(aPat);
    const om = line.match(optPat);

    // Verificar si hay múltiples opciones en una línea
    const multiOpts = line.match(/^[a-fA-F]\)\s*.+\s+[a-fA-F]\)\s*.+/);

    if (qm && !om) { // Es pregunta (no es opción que empieza con letra)
      save();
      current = { text: qm[2], answer: '', type: 'open' };
      mode = 'q';
    } else if (am && current) {
      current.answer = (am[1]||am[2]||am[3]||'').trim();
      mode = 'a';
    } else if (multiOpts && current) {
      // Múltiples opciones en una línea
      let m;
      const regex = /([a-fA-F])\)\s*([^a-fA-F\)]+?)(?=\s+[a-fA-F]\)|$)/gi;
      while ((m = regex.exec(line)) !== null) {
        const isCorrect = correctMarker.test(m[0]);
        opts.push({ letter: m[1].toUpperCase(), text: m[2].trim(), correct: isCorrect });
      }
    } else if (om && current) {
      const isCorrect = correctMarker.test(line);
      const letter = om[1].toUpperCase();
      // Convertir romanos a letras si es necesario
      const letterNorm = /^[ivxIVX]+$/.test(om[1]) ? romanToLetter(om[1]) : letter;
      opts.push({ letter: letterNorm, text: om[2].trim(), correct: isCorrect });
      mode = 'q'; // seguimos en modo pregunta para capturar más opciones
    } else if (current) {
      if (mode === 'q') current.text += ' ' + line;
      else if (mode === 'a') current.answer += ' ' + line;
    }
  }
  save();
  return questions;
}

// Convertir números romanos a letras (i→A, ii→B, etc.)
function romanToLetter(roman) {
  const map = { 'i':1, 'ii':2, 'iii':3, 'iv':4, 'v':5, 'vi':6 };
  const n = map[roman.toLowerCase()] || 1;
  return String.fromCharCode(64 + n); // A=65
}

// ── ESTRATEGIA 4: "Pregunta N:" label ──
function parsePreguntaLabel(lines) {
  const questions = [];
  const qPat = /^pregunta\s+\d+[\.\:\-]?\s*(.+)?/i;
  // Requiere separador cuando es "r" sola para no capturar texto narrativo
  const aPat = /^respuesta[:\.\-]?\s*(.+)?|^r[:\.\-]\s*(.+)?/i;

  let current = null;
  let mode = null;

  const save = () => { if (current) questions.push(current); current = null; mode = null; };

  for (const line of lines) {
    if (!line || isSkipLine(line)) continue;
    const qm = line.match(qPat);
    const am = line.match(aPat);
    if (qm) {
      save();
      current = { text: qm[1]||'', answer: '', type: 'open' };
      mode = 'q';
    } else if (am && current) {
      current.answer = (am[1]||am[2]||'').trim();
      mode = 'a';
    } else if (current) {
      if (mode === 'q') current.text += ' ' + line;
      else if (mode === 'a') current.answer += ' ' + line;
    }
  }
  save();
  return questions;
}

// ── ESTRATEGIA 5: Preguntas sin número con opciones a), b), c), d) ──
function parseQuestionWithOptions(lines) {
  const questions = [];
  // Opciones: a) / a. / A) / A. / (a) / [a] / a- y también números 1) 2) para sub-opciones
  const optPat = /^[\(\[]?([a-fA-F])[\)\.\-\]]\s*(.+)/;
  // Opciones V/F inline: ( ) V  ( ) F  o  [ ] Verdadero  [ ] Falso
  const vfOptPat = /[\(\[]\s*[\)\]]\s*(V|F|Verdadero|Falso|True|False|Cierto|Correcto|Incorrecto)/i;
  // Opciones múltiples en una línea
  const multiOptInline = /([a-fA-F])\)\s*([^a-fA-F\)]{2,})/g;

  // Detecta preguntas con "?" o que empiezan con verbos imperativos comunes
  const isQuestion = l => {
    if (isSkipLine(l) || l.trim().length < 6) return false;
    // Tiene signo de pregunta
    if (/\?/.test(l)) return true;
    // Empieza con interrogativo
    if (/^(qué|cuál|cuáles|cómo|dónde|cuándo|cuánto|cuántos|cuántas|quién|quiénes|por\s*qué|what|which|how|where|when|who|why)/i.test(l.trim())) return true;
    // Verbos imperativos que inician consignas (español e inglés)
    if (/^(escribe|escriba|escribí|completa|complete|completá|identifica|identifique|identificá|menciona|mencione|mencioná|indica|indique|indicá|señala|señale|señalá|ordena|ordene|ordená|clasifica|clasifique|clasificá|relaciona|relacione|relacioná|define|defina|definí|explica|explique|explicá|describe|describa|describí|resuelve|resuelva|resolvé|calcula|calcule|calculá|determina|determine|determiná|encuentra|encuentre|encontrá|selecciona|seleccione|seleccioná|elige|elija|elegí|marca|marque|marcá|subraya|subraye|subrayá|une|una|uní|lee|lea|leé|nombra|nombre|nombrá|analiza|analice|analizá|compara|compare|compará|diferencia|diferencie|diferenciá|enumera|enumere|enumerá|justifica|justifique|justificá|argumenta|argumente|argumentá|demuestra|demuestre|demostrá|traduce|traduzca|traducí|conjuga|conjugue|conjugá|redacta|redacte|redactá|elabora|elabore|elaborá|investiga|investigue|investigá|observa|observe|observá|dibuja|dibuje|dibujá|grafica|grafique|graficá|traza|trace|trazá|mide|mida|medí|write|read|find|choose|select|match|circle|underline|fill|complete|answer|solve|calculate|identify|describe|explain|list|name|give|state)/i.test(l.trim())) return true;
    // Frases comunes de preguntas
    if (/^(según|de acuerdo|con base|basándose|a partir|en relación|respecto|acerca|sobre|considerando|teniendo|dado|dada|dados|dadas|si\s+.+\s*,?\s*(entonces|qué|cuál))/i.test(l.trim())) return true;
    return false;
  };

  // Detectar si una línea es parte de opciones V/F
  const isVFLine = l => /^[\(\[]\s*[\)\]]\s*(V|F|Verdadero|Falso)/i.test(l) || /^\s*(V|F)\s*[\)\.\-]/i.test(l);

  let current = null;
  let opts = [];

  const save = () => {
    if (current) {
      if (opts.length >= 2) {
        current.options = opts;
        current.type = 'multiple';
      }
      // Detectar V/F aunque no tenga opciones explícitas
      if (opts.length === 0 && /verdadero|falso|v\s*\/\s*f/i.test(current.text)) {
        current.type = 'vf';
      }
      questions.push(current);
    }
    current = null;
    opts = [];
  };

  for (const line of lines) {
    if (!line || isSkipLine(line)) continue;

    const om = line.match(optPat);
    // Detectar múltiples opciones en una línea: "a) sí   b) no   c) tal vez"
    const hasMultiOpt = /[a-fA-F]\)\s*.+\s+[a-fA-F]\)\s*.+/.test(line);
    // Detectar respuesta correcta marcada
    const correctMarker = /^\*|[\*✓✔]$|\(correcta?\)|\(correct\)/i;

    if (isQuestion(line) && !om && !hasMultiOpt) {
      save();
      current = { text: line.trim(), answer: '', type: 'open' };
    } else if (hasMultiOpt && current) {
      // Extraer múltiples opciones de una línea
      const regex = /([a-fA-F])\)\s*([^a-fA-F\)]+?)(?=\s+[a-fA-F]\)|$)/gi;
      let m;
      while ((m = regex.exec(line)) !== null) {
        const isCorrect = correctMarker.test(m[0]);
        opts.push({ letter: m[1].toUpperCase(), text: m[2].trim(), correct: isCorrect });
        if (isCorrect && current) current.answer = m[1].toUpperCase();
      }
    } else if (om && current) {
      const isCorrect = correctMarker.test(line);
      opts.push({ letter: om[1].toUpperCase(), text: om[2].trim(), correct: isCorrect });
      if (isCorrect) current.answer = om[1].toUpperCase();
    } else if (isVFLine(line) && current) {
      // Opciones V/F
      current.type = 'vf';
    } else if (current && !om && line.trim().length > 3) {
      // Línea que no es opción ni pregunta - puede ser continuación
      if (opts.length === 0) {
        current.text += ' ' + line.trim();
      }
    }
  }
  save();

  return questions;
}

// ── ESTRATEGIA 6: Fallback mejorado ──
function parseFallback(lines) {
  const questions = [];
  // Buscar cualquier línea que parezca pregunta
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    if (!l || isSkipLine(l)) continue;

    // Línea con ? o que empieza con interrogativo
    const isQ = (l.includes('?') && l.trim().length > 8) ||
                /^(qué|cuál|cómo|dónde|cuándo|cuánto|quién|por\s*qué)/i.test(l.trim());

    if (isQ) {
      const q = { text: l.trim(), answer: '', type: 'open' };

      // Verificar si las siguientes líneas son opciones
      let opts = [];
      let j = i + 1;
      while (j < lines.length && /^[\(\[]?[a-fA-F][\)\.\-\]]/.test(lines[j])) {
        const om = lines[j].match(/^[\(\[]?([a-fA-F])[\)\.\-\]]\s*(.+)/);
        if (om) opts.push({ letter: om[1].toUpperCase(), text: om[2].trim() });
        j++;
      }

      if (opts.length >= 2) {
        q.options = opts;
        q.type = 'multiple';
        i = j - 1; // Saltar las líneas de opciones
      }

      questions.push(q);
    }
  }
  return questions;
}

// ── HELPERS ──
// ── Detectar secciones con porcentaje/puntos desde las líneas ──
function detectSections(lines) {
  const sections = [];
  // Ej: "Parte I (40%)", "Sección 1 – Completar – 30 puntos", "Bloque A: 20%"
  const headerPat = /^(?:(parte|sección|seccion|bloque|unidad|módulo|modulo|apartado)\s+([IVXLCDM]+|\d+|[A-F])|([IVXLCDM]{2,6})\.)\s*[:\.\-]?\s*(.*)/i;
  const pctPat    = /(\d+(?:\.\d+)?)\s*%/;
  const ptsPat    = /(?:valor|puntos?|pts?)\s*:?\s*(\d+)|(\d+)\s*(?:puntos?|pts?)\b/i;

  for (let i = 0; i < lines.length; i++) {
    const line = (lines[i] || '').trim();
    if (!line || line.length < 3 || line.length > 130) continue;
    const m = line.match(headerPat);
    if (!m) continue;

    const pct = line.match(pctPat);
    const pts = line.match(ptsPat);
    // Para numerales romanos solos, exigir al menos un indicador de peso
    if (m[3] && !pct && !pts) continue;

    const prefix = m[1] ? `${m[1]} ${m[2]}` : `${m[3]}.`;
    const rest   = (m[4]||'').replace(/[\(\)\[\]]/g,'')
                              .replace(/\d+\s*%/g,'')
                              .replace(/(?:valor|puntos?|pts?)\s*:?\s*\d+/gi,'')
                              .replace(/(\d+)\s*(?:puntos?|pts?)/gi,'')
                              .trim();
    const name   = (rest ? `${prefix}: ${rest}` : prefix).replace(/\s+/g,' ').trim();

    let weight = 0, isPoints = false;
    if (pct)      { weight = parseFloat(pct[1]); }
    else if (pts) { weight = parseInt(pts[1]||pts[2]); isPoints = true; }

    sections.push({ id: sections.length + 1, name, weight, isPoints, lineIdx: i });
  }

  if (sections.length === 0) return [];

  // Convertir puntos a porcentaje si es necesario
  if (sections.some(s => s.isPoints)) {
    const totalPts = sections.reduce((sum, s) => sum + s.weight, 0);
    if (totalPts > 0) sections.forEach(s => { s.weight = Math.round(s.weight / totalPts * 100); });
  }

  // Si no sumaron ~100, normalizar
  const totalW = sections.reduce((sum, s) => sum + s.weight, 0);
  if (totalW < 10) {
    // Sin pesos: distribuir equitativamente
    const eq = Math.floor(100 / sections.length);
    sections.forEach((s, i) => { s.weight = i < sections.length - 1 ? eq : 100 - eq * (sections.length - 1); });
  } else if (Math.abs(totalW - 100) > 5) {
    sections.forEach(s => { s.weight = Math.round(s.weight / totalW * 100); });
  }

  return sections.map(({ id, name, weight, lineIdx }) => ({ id, name, weight, lineIdx }));
}

function updateSectionWeight(id, val) {
  const sec = S.sections.find(s => s.id === id);
  if (sec) sec.weight = Math.max(0, Math.min(100, isNaN(val) ? 0 : val));
  render();
}

function isSkipLine(l) {
  if (!l || l.length < 2) return true;
  const t = l.trim().toLowerCase();
  return /^[-─═=\s*_\.]+$/.test(l)                         // líneas separadoras
    || /^(unidad|secci[oó]n|parte|cap[ií]tulo|tema|bloque|m[oó]dulo|lecci[oó]n|actividad)\s*\d*\s*[:\.\-]?\s*$/i.test(l) // secciones sin contenido
    || /^ejercicio\s+\d+\s*[:\.\-]?\s*$/i.test(l)          // "Ejercicio 1:" solo
    || /^(cuestionario|examen|evaluaci[oó]n|prueba|test|quiz)\s*\d*\s*$/i.test(l) // títulos
    || /^(nombre|fecha|curso|grado|grupo|a[ñn]o|materia|asignatura|profesor|docente|alumno|estudiante)\s*[:\.\-]?\s*_*\s*$/i.test(l) // campos de formulario
    || /^(instrucciones|indicaciones|nota|observaci[oó]n|importante)\s*[:\.\-]?\s*$/i.test(l) // encabezados de instrucciones
    || /^p[aá]gina\s+\d+/i.test(l)                         // números de página
    || /^\d+\s*\/\s*\d+$/.test(l)                          // "1/10" paginación
    || /^(total|puntaje|puntos|calificaci[oó]n|nota)\s*[:\.\-]?\s*\d*\s*$/i.test(l); // totales
}

function isEjercicio(l) { return /^ejercicio\s+\d+/i.test(l); }

// Preprocesar líneas: unir líneas fragmentadas, normalizar formato
function preprocessLines(lines) {
  const result = [];
  let buffer = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) {
      if (buffer) { result.push(buffer); buffer = ''; }
      continue;
    }

    // Si la línea anterior no terminó en puntuación y esta no empieza con patrón especial
    const continuesLine = buffer &&
      !/[.?!:;\]\)]$/.test(buffer) &&
      !/^[\(\[]?[a-fA-F\d][\)\.\-\]]/.test(line) &&
      !/^(r|respuesta|pregunta|consigna|ejercicio)/i.test(line) &&
      !isSkipLine(line);

    if (continuesLine && line.length < 120) {
      buffer += ' ' + line;
    } else {
      if (buffer) result.push(buffer);
      buffer = line;
    }
  }
  if (buffer) result.push(buffer);

  return result;
}

// detectType está definida más abajo

function clean(str) {
  return (str||'').replace(/\s+/g,' ').replace(/^[\-\.\:\s]+/,'').trim();
}

// Genera palabras clave automáticas a partir de la respuesta
function autoKeywords(answer) {
  if (!answer) return '';
  // Tomar palabras de más de 5 letras que no sean stopwords
  const stops = new Set(['para','como','que','con','una','los','las','del','por','son','sus','está','este','esta','ese','esa','más','pero','porque','cuando','donde','quien','cuál','qué','cómo']);
  const words = answer.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z\s]/g,' ')
    .split(/\s+/)
    .filter(w => w.length > 4 && !stops.has(w));
  // Únicos, máximo 8
  const unique = [...new Set(words)].slice(0,8);
  return unique.join(', ');
}

function detectType(text, hasOptions = false) {
  const t = text.toLowerCase();

  // V/F: detectar múltiples formatos
  if (/verdadero\s*(o|\/|\|)?\s*falso|falso\s*(o|\/|\|)?\s*verdadero|v\s*\/\s*f|f\s*\/\s*v|true\s*(or|\/|\|)?\s*false|\(\s*\)\s*v\s+\(\s*\)\s*f|\[\s*\]\s*v\s+\[\s*\]\s*f|cierto\s*(o|\/|\|)?\s*falso|correcto\s*(o|\/|\|)?\s*incorrecto|indica\s+si\s+(es\s+)?(verdadero|cierto|correcto)|marca\s+(v|verdadero)\s+o\s+(f|falso)|di\s+si\s+(es\s+)?(verdad|mentira|cierto|falso)/i.test(t)) return 'vf';

  // Si tiene opciones definidas → multiple
  if (hasOptions) return 'multiple';

  // Relacionar/Match: detectar preguntas de emparejar columnas
  if (/relaciona|relacione|relacioná|une\s+(con|cada)|empareja|empareje|emparejá|conecta|conecte|conectá|asocia|asocie|asociá|match|matching|columna\s*a.*columna\s*b|une\s+las?\s+columnas?|traza\s+(una\s+)?l[ií]nea/i.test(t)) return 'match';

  // Ordenar: detectar preguntas de secuencia
  if (/ordena|ordene|ordená|orden(a|e)?\s+(cronol[oó]gic|l[oó]gic|alfab[eé]tic|secuenc)|pon\s+en\s+orden|organiza|organice|organizá|secuencia|enumera\s+(en\s+)?orden|arrange|put\s+in\s+order|sequence/i.test(t)) return 'order';

  // Fill: detectar espacios en blanco de múltiples formas
  if (/_{2,}|\.{3,}|\[\s*\]|\(\s*\)|\(blank\)|\(espacio\)|<blank>|<espacio>|completa\s+(la|el|los|las|con)|complete|completá|llena\s+(el|los|la|las)|llene|llená|rellena|rellene|rellaná|escribe\s+(en\s+)?(el|los|la|las)?\s*(espacio|blank|hueco)|fill\s+in|palabra\s+faltante|espacio\s+en\s+blanco/i.test(t)) return 'fill';

  // Cálculo/numérico: detectar preguntas matemáticas
  if (/calcula|calcule|calculá|resuelve|resuelva|resolvé|halla|halle|hallá|encuentra\s+(el|la)\s*(valor|resultado|suma|resta|producto|cociente|[aá]rea|per[ií]metro|volumen)|solve|compute|find\s+the\s+(value|result|sum|difference|product|area|perimeter)/i.test(t)) return 'numeric';

  return 'open';
}

function setOpt(qi, oi, letter, val) {
  const q = S.questions[qi];
  if (!q.options) q.options = [];
  // Rellenar posiciones vacías para evitar array sparse
  while (q.options.length <= oi) q.options.push({ letter: ['A','B','C','D'][q.options.length] || '', text: '' });
  q.options[oi] = { letter, text: val };
}

function renderQList() {
  const tl = { open:'Desarrollo', fill:'Completar', multiple:'Opción múltiple', vf:'V/F' };

    ? `<div class="empty"><div class="empty-icon">📝</div><div>No hay preguntas todavía.</div></div>`
    : S.questions.map((q,i) => renderQCard(q,i,tl)).join('');
  updateSummary();
}

function updateSummary() {
  const pts = S.questions.reduce((a,q)=>a+(q.points||1),0);
  const withAns = S.questions.filter(q=>(q.answer||'').trim()).length;
  const vs = document.querySelectorAll('.summary-val');
  if (vs[0]) vs[0].textContent = S.questions.length;
  if (vs[1]) vs[1].textContent = pts;
  if (vs[2]) vs[2].textContent = withAns;
}

function addQuestion() {

function removeQ(i) {
  const q = S.questions[i];
  const preview = q.text.substring(0, 50) + (q.text.length > 50 ? '...' : '');
  if (!confirm(`¿Eliminar pregunta ${i+1}?\n"${preview}"`)) return;
  S.questions.splice(i, 1);
  S.questions.forEach((q,idx) => q.id = idx);
  renderQList();
  saveState();
}

function moveQ(i, dir) {
  const newIdx = i + dir;
  if (newIdx < 0 || newIdx >= S.questions.length) return;
  const tmp = S.questions[i];
  S.questions[i] = S.questions[newIdx];
  S.questions[newIdx] = tmp;
  S.questions.forEach((q,idx) => q.id = idx);
  renderQList();
  saveState();
}

function duplicateQ(i) {
  const orig = S.questions[i];
  const copy = JSON.parse(JSON.stringify(orig));
  copy.text = copy.text + ' (copia)';
  S.questions.splice(i + 1, 0, copy);
  S.questions.forEach((q,idx) => q.id = idx);
  renderQList();
  saveState();
  toast('Pregunta duplicada', 'ok');
}

function validateAndNext() {
  if (S.questions.length === 0) { toast('Agregá al menos una pregunta','error'); return; }
  const bad = S.questions.find(q => !q.text.trim());
  if (bad) { toast('Todas las preguntas deben tener enunciado','error'); return; }
  // Tipos que no requieren respuesta en texto (tienen su propia lógica)
  const specialTypes = ['multiple', 'vf', 'match', 'order'];
  const noAns = S.questions.filter(q => !(q.answer||'').trim() && !specialTypes.includes(q.type));
  if (noAns.length > 0) {
    if (!confirm(`${noAns.length} pregunta(s) no tienen respuesta correcta. ¿Continuar de todas formas?`)) return;
  }
  S.step = 4; render();
}

async function hashPassword(password, salt) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + salt);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function exportJSON() {
  const pw1 = document.getElementById('pw1').value.trim();
  const pw2 = document.getElementById('pw2').value.trim();
  if (!pw1) { toast('Ingresá una contraseña','error'); return; }

  if (pw1 !== pw2) { toast('Las contraseñas no coinciden','error'); return; }
  S.password = pw1;

  // Hash seguro con SHA-256
  const salt = S.meta.name + '_examdoc_v2';
  const pwHash = await hashPassword(pw1, salt);

  // Estructura del JSON — respuestas van en base64 para no ser obvias
  const examData = {
    version: '1.0',
    meta: {
      name: S.meta.name,
      subject: S.meta.subject,
      grade: S.meta.grade,
      section: S.meta.section,
      teacher: S.meta.teacher,
      date: S.meta.date,
      instructions: S.meta.instructions,
      duration: S.meta.duration || 0,
      totalPoints: S.questions.reduce((a,q)=>a+(q.points||1),0),
      created: new Date().toISOString(),
    },

      id: i+1,
      text: q.text,
      type: q.type,
      points: q.points || 1,
      section: q.section || null,
      options: q.options || [],
      // Respuesta correcta y palabras clave van en base64
      _r: btoa(encodeURIComponent(JSON.stringify({
        answer: q.answer,
        correct: q.correct || '',
        keywords: q.keywords,
      }))),
    })),
  };

  const blob = new Blob([JSON.stringify(examData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = S.meta.name.replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ\s]/g, '').replace(/\s+/g,'-').toLowerCase();

  a.download = `examen-${safeName}.json`;
  a.click();
  URL.revokeObjectURL(url);

  toast('JSON generado y descargado ✓','ok');
  clearState(); // Limpiar estado guardado después de exportar

  // Mostrar mensaje de éxito
  setTimeout(() => {
    document.getElementById('app').innerHTML += `

}

function resetAll() {
  if (!confirm('¿Estás seguro de que querés crear un nuevo examen? Se perderá todo el progreso actual.')) return;
  clearState();
  Object.assign(S, { ...defaultState });
  render();
}

function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = type==='error'?'#dc2626':type==='ok'?'#16a34a':'#1e293b';
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

function exportPrint() {
  const totalPts = S.questions.reduce((a,q)=>a+(q.points||1),0);

  // Agrupar preguntas por tipo
  const byType = { open: [], fill: [], multiple: [], vf: [], numeric: [], match: [], order: [] };
  S.questions.forEach((q,i) => {
    byType[q.type] = byType[q.type] || [];
    byType[q.type].push({ ...q, num: i + 1 });
  });

  const sectionLabels = {
    open: 'Desarrollo',
    fill: 'Completar',
    multiple: 'Selección Múltiple',
    vf: 'Verdadero o Falso',
    numeric: 'Cálculo / Ejercicios',
    match: 'Relacionar',
    order: 'Ordenar'
  };

  // Generar secciones
  const sections = Object.entries(byType)
    .filter(([type, qs]) => qs.length > 0)
    .map(([type, qs], secIdx) => {
      const ptsPerQ = qs[0]?.points || 1;
      return `
  <div class="section">
    <div class="q-section-title">Parte ${secIdx + 1} — ${sectionLabels[type]} (${ptsPerQ} pts c/u)</div>
    ${qs.map(q => {
      if (type === 'multiple' && q.options && q.options.length > 0) {
        return `
    <div class="question">
      <span class="question-num">${q.num}.</span> ${esc(q.text)}
      <div class="options-grid">
        ${q.options.map(o => `<div class="option-item"><span class="opt-letter">${o.letter})</span> ${esc(o.text)}</div>`).join('')}
      </div>
    </div>`;
      } else if (type === 'vf') {
        return `
    <div class="question">
      <span class="question-num">${q.num}.</span> ${esc(q.text)}
      <span class="vf-space">V</span> <span class="vf-space">F</span>
    </div>`;
      } else if (type === 'fill') {
        return `
    <div class="question">
      <span class="question-num">${q.num}.</span> ${esc(q.text)}
    </div>`;
      } else if (type === 'numeric' || type === 'match' || type === 'order') {
        // Cálculo/Ejercicios: espacio en blanco grande SIN líneas para desarrollo a mano
        const height = q.points >= 3 ? 120 : (q.points >= 2 ? 90 : 70);
        return `
    <div class="question">
      <span class="question-num">${q.num}.</span> ${esc(q.text)}
      <div class="work-space" style="min-height:${height}px;border:1px dashed #ccc;margin-top:5px;background:#fafafa;border-radius:4px"></div>
    </div>`;
      } else {
        // Desarrollo
        const lines = q.points >= 3 ? 5 : 3;
        return `
    <div class="question">
      <span class="question-num">${q.num}.</span> ${esc(q.text)}
      <div class="answer-lines">${'<div class="answer-line"></div>'.repeat(lines)}</div>
    </div>`;
      }
    }).join('')}
  </div>`;
    }).join('');

  const html = `<!DOCTYPE html>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

    background: white;

  }

    display: flex;
    align-items: flex-start;
    border-bottom: 2.5px solid black;
    padding-bottom: 8px;

    gap: 10px;
  }
  .header-left { flex: 1; }
  .school-name {
    font-size: 12pt;

    letter-spacing: 0.03em;

  }

    font-size: 8pt;

    margin-bottom: 6px;
  }
  .header-fields { font-size: 8.5pt; line-height: 1.9; }
  .field-row { display: flex; gap: 1rem; margin-bottom: 1px; }
  .field { display: flex; align-items: baseline; gap: 3px; }

    display: flex;

    body { background: white; padding: 0; }

  <div class="score-bar">
    <span class="score-box">Puntaje: _____ / ${totalPts}</span>
    <span class="score-box">Nota: _____</span>
  </div>

  ${S.meta.instructions ? `
  <div class="section">
    <div class="section-title">Indicaciones Generales</div>
    <div class="indicaciones">${esc(S.meta.instructions)}</div>
  </div>` : ''}

  ${sections}

</div>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = S.meta.name.replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ\s]/g, '').replace(/\s+/g,'-').toLowerCase();
  a.href = url;
  a.download = `examen-${safeName}-imprimible.html`;
  a.click();
  URL.revokeObjectURL(url);
  toast('HTML imprimible generado ✓','ok');
}

function bindEvents() {
  // Bind Enter en inputs de paso 1
  document.querySelectorAll('.input').forEach(el => {
    if (el.type === 'text' || el.type === 'date' || el.type === 'password') {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const btns = document.querySelectorAll('.btn-primary, .btn-success');
          if (btns.length > 0) btns[btns.length-1].click();
        }
      });
    }
  });
}

// Atajos de teclado globales
document.addEventListener('keydown', e => {
  // Ctrl+S = guardar manualmente (aunque ya autoguarda)
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveState();
    toast('Guardado', 'ok');
  }
});

// INIT
render();

// Mostrar aviso de recuperación si hay datos guardados
if (loadState() && (S.questions.length > 0 || S.meta.name)) {
  setTimeout(() => toast('Progreso anterior recuperado', 'ok'), 500);
}
</script>
</body>
</html>
